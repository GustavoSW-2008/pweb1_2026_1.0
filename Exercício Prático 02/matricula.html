<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Matrícula de Alunos</title>
</head>
<body>
    <form action="sucesso.html" method="get">
        <fieldset>
            <legend>Formulário de Matrícula</legend>

            <label for="nome">Nome do Aluno:</label>
            <input type="text" id="nome" name="nome" maxlength="50" required><br><br>

            <label for="nascimento">Data de nascimento:</label>
            <input type="date" id="nascimento" name="nascimento" required><br><br>

            <label for="email">E-mail:</label>
            <input type="email" id="email" name="email" required><br><br>

            <label for="telefone">Telefone:</label>
            <input type="tel" id="telefone" name="telefone" maxlength="15" required><br><br>

            <label for="serie">Série:</label>
            <select id="serie" name="serie" required>
                <option value="">Selecione...</option>
                <option value="1">1º ano do Ensino Médio</option>
                <option value="2">2º ano do Ensino Médio</option>
                <option value="3">3º ano do Ensino Médio</option>
                <option value="4">4º ano do Ensino Médio</option>
            </select><br><br>

            <label>Turno preferencial:</label><br>
            <input type="radio" id="manha" name="turno" value="manha" required>
            <label for="manha">Manhã</label>
            <input type="radio" id="tarde" name="turno" value="tarde" required>
            <label for="tarde">Tarde</label>
            <input type="radio" id="noite" name="turno" value="noite" required>
            <label for="noite">Noite</label><br><br>

            <label>Atividades extra-curriculares:</label><br>
            <input type="checkbox" id="teatro" name="atividades" value="teatro">
            <label for="teatro">Teatro</label>
            <input type="checkbox" id="musica" name="atividades" value="musica">
            <label for="musica">Música</label>
            <input type="checkbox" id="ballet" name="atividades" value="ballet">
            <label for="ballet">Ballet</label>
            <input type="checkbox" id="pintura" name="atividades" value="pintura">
            <label for="pintura">Pintura</label>
            <input type="checkbox" id="judo" name="atividades" value="judo">
            <label for="judo">Judô</label>
            <input type="checkbox" id="futebol" name="atividades" value="futebol">
            <label for="futebol">Futebol</label><br><br>

            <button type="submit" a="sucesso.html">Submit</button>
        </fieldset>
    </form>
</body>
</html>
