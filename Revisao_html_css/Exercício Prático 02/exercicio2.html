<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Ficha Cadastral</title>
</head>
<body>
    <h2>Ficha Cadastral</h2>
    
    <form>
        <table>
            <tr>
                <td><label for="nome">Nome:</label></td>
                <td colspan="3"><input type="text" id="nome" name="nome" size="55"></td>
            </tr>
            <tr>
                <td><label for="rg">RG:</label></td>
                <td><input type="text" id="rg" name="rg" size="13"></td>
                <td><label for="cpf">CPF:</label></td>
                <td><input type="text" id="cpf" name="cpf" size="13"></td>
            </tr>
            <tr>
                <td><label for="endereco">Endereço:</label></td>
                <td colspan="3"><input type="text" id="endereco" name="endereco" size="55"></td>
            </tr>
            <tr>
                <td><label for="sexo">Sexo:</label></td>
                <td>
                    <select id="sexo" name="sexo">
                        <option value="masculino">Masculino</option>
                        <option value="feminino">Feminino</option>
                    </select>
                </td>
                <td><label for="data_nascimento">Data Nascimento:</label></td>
                <td><input type="text" id="data_nascimento" name="data_nascimento" size="13"></td>
            </tr>
            <tr>
                <td>Situação Civil:</td>
                <td colspan="3">
                    <input type="radio" id="solteiro" name="civil" value="solteiro"> 
                    <label for="solteiro">Solteiro(a)</label>
                    <input type="radio" id="casado" name="civil" value="casado"> 
                    <label for="casado">Casado(a)</label>
                    <input type="radio" id="viuvo" name="civil" value="viuvo"> 
                    <label for="viuvo">Viúvo(a)</label>
                </td>
            </tr>
            <tr>
                <td colspan="4">
                    <br>
                    <button type="reset">Limpar Dados</button>
                </td>
            </tr>
        </table>
    </form>
</body>
</html>
